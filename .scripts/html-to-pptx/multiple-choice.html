<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Multiple Choice — Quiz Question</title>

<style>
:root {
  --ccbeu-blue: #0448DF;
  --ccbeu-pink: #FD3682;
  --ccbeu-white: #FFFFFF;
  --ink: #0E1116;
  --ink-muted: #6B7280;
  --ink-footer: #9AA1AC;
  --surface-zebra: #F7F8FB;
  --border-hair: #ECEDF0;
  --font-title: 'Poppins', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
}
html, body { margin: 0; }
.stage { position: relative; width: 100vw; height: 100vh; background: #2b2f36; overflow: hidden; }
.mc-canvas { position: absolute; top: 0; left: 0; }
.mc-opt { display: flex; align-items: center; gap: 16px; height: 56px; border-bottom: 1px solid var(--border-hair); }
.mc-opt-letter { flex: 0 0 40px; font-family: var(--font-title); font-weight: 700; font-size: 13pt; color: var(--ccbeu-pink); }
.mc-opt-text { font-family: var(--font-body); font-weight: 500; font-size: 15pt; color: var(--ink); }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,700;0,800;1,400;1,700&family=Inter:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
<div class="stage">
  <div class="mc-canvas" style="width: 1280px; height: 720px; background: #fff; overflow: hidden; font-family: var(--font-body);">

    <div style="position: absolute; left: 80px; top: 62px; display: flex; align-items: center; gap: 10px; font-family: var(--font-title); font-weight: 500; font-size: 9pt; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ccbeu-blue);"><span style="width: 8px; height: 8px; border-radius: 999px; background: var(--ccbeu-pink); flex: 0 0 auto;"></span>{{BREADCRUMB}}</div>

    <div style="position: absolute; left: 80px; top: 124px; font-family: var(--font-title); font-weight: 700; font-size: 12pt; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ccbeu-pink);">{{TAG}}</div>

    <h1 style="position: absolute; left: 80px; top: 168px; width: 1120px; margin: 0; font-family: var(--font-title); font-weight: 700; font-size: 28pt; line-height: 1.25; color: var(--ccbeu-blue);">{{QUESTION}}</h1>

    <div style="position: absolute; left: 80px; top: 320px; width: 700px;">
      <div class="mc-opt"><div class="mc-opt-letter">A</div><div class="mc-opt-text">{{OPTION1}}</div></div>
      <div class="mc-opt"><div class="mc-opt-letter">B</div><div class="mc-opt-text">{{OPTION2}}</div></div>
      <div class="mc-opt"><div class="mc-opt-letter">C</div><div class="mc-opt-text">{{OPTION3}}</div></div>
    </div>

    <div style="position: absolute; left: 80px; top: 636px; font-family: var(--font-body); font-size: 9pt; color: var(--ink-footer);">CCBEU English Center</div>
  </div>
</div>

</body></html>
