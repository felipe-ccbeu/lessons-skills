<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Section Transition — Generic Title Card</title>

<style>
:root {
  --ccbeu-blue: #0448DF;
  --ccbeu-pink: #FD3682;
  --ccbeu-white: #FFFFFF;
  --ink-strong: #000000;
  --ink: #0E1116;
  --ink-muted: #6B7280;
  --ink-footer: #9AA1AC;
  --surface: #FFFFFF;
  --font-title: 'Poppins', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
}
html, body { margin: 0; }
.stage { position: relative; width: 100vw; height: 100vh; background: #2b2f36; overflow: hidden; }
.st-canvas { position: absolute; top: 0; left: 0; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,700;0,800;1,400;1,700&family=Inter:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
<div class="stage">
  <div class="st-canvas" style="width: 1280px; height: 720px; background: #fff; overflow: hidden; font-family: var(--font-body);">

    <div style="position: absolute; left: 80px; top: 62px; display: flex; align-items: center; gap: 10px; font-family: var(--font-title); font-weight: 500; font-size: 9pt; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ccbeu-blue);"><span style="width: 8px; height: 8px; border-radius: 999px; background: var(--ccbeu-pink); flex: 0 0 auto;"></span>{{BREADCRUMB}}</div>

    <div style="position: absolute; left: 80px; top: 200px; font-family: var(--font-title); font-weight: 700; font-size: 12pt; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ccbeu-pink);">{{TAG}}</div>

    <h1 style="position: absolute; left: 80px; top: 260px; width: 1120px; margin: 0; font-family: var(--font-title); font-weight: 800; font-size: 54pt; line-height: 1.1; color: var(--ccbeu-blue);">{{TITLE}}</h1>

    <p style="position: absolute; left: 80px; top: 420px; width: 900px; margin: 0; font-family: var(--font-body); font-weight: 400; font-size: 18pt; line-height: 1.4; color: var(--ink-muted);">{{SUBTITLE}}</p>

    <div style="position: absolute; left: 80px; top: 636px; font-family: var(--font-body); font-size: 9pt; color: var(--ink-footer);">CCBEU English Center</div>
  </div>
</div>

</body></html>
